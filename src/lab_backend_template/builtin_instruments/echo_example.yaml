# Structural example only. It does not describe verified hardware.
metadata:
  manufacturer: "Template"
  model: "Echo memory example"
  category: "other"
  support_level: "experimental"
  definition_version: "0.1.0"
  manual_ref: "lab-backend-template Echo example protocol"
  description: >-
    Structural template backed only by in-memory state. Hardware has not been
    verified. Replace ranges and shutdown behavior using the target manual.

connection:
  default_timeout_ms: 1000
  read_termination: ""
  write_termination: ""

commands:
  read_value:
    scpi: "GET value"
    type: "query"
    description: "Read the example value."
    polling_safe: true
    parameters: []
    returns:
      type: "float"

  set_value:
    scpi: "SET value {value}"
    type: "write"
    description: "Set the example value within the template safety range."
    parameters:
      - name: "value"
        type: "float"
        range: [0, 100]

  set_safe_value:
    scpi: "SET value 0"
    type: "write"
    description: "Return the example to its declared safe value."
    parameters: []

state_query:
  value:
    command: "read_value"

safe_shutdown:
  - command: "set_safe_value"
