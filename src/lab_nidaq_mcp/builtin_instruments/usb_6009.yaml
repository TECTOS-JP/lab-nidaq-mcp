# NI USB-6009 software-timed single-point definition. Command strings use the
# backend wire language, not SCPI. Output use requires an explicit backend
# safe_value configuration and any configured interlock must permit each write.
metadata:
  manufacturer: "National Instruments"
  model: "USB-6009"
  category: "daq"
  description: >-
    Multifunction DAQ for single-point analog and digital input/output. The
    installer must wire external circuitry so a high-impedance output is safe;
    software cannot guarantee output state after host or USB power loss.
  manual_ref: "NI USB-6008/6009 User Guide and Specifications"
  support_level: "experimental"
  tested_interfaces: ["USB"]
  tested_firmware: ""
  definition_version: "0.1.0"
connection:
  default_timeout_ms: 5000
  read_termination: ""
  write_termination: ""
commands:
  identify:
    scpi: "INFO model"
    type: "query"
    description: "Return the configured model."
    returns: {type: "string"}
  read_ai0:
    scpi: "READ AI ai0"
    type: "query"
    description: "Read configured analog input ai0."
    polling_safe: true
    returns: {type: "float", unit: "V"}
  acquire_ai0:
    scpi: "ACQUIRE ai0 {samples} {rate_hz}"
    type: "query"
    description: "Acquire a finite buffered ai0 waveform as an NPZ artifact."
    parameters:
      - {name: "samples", type: "integer", range: [1, 1000000]}
      - {name: "rate_hz", type: "float", range: [1, 48000], unit: "Hz"}
    returns: {type: "string"}
  read_di0:
    scpi: "READ DI port0/line0"
    type: "query"
    description: "Read digital input port0/line0."
    polling_safe: true
    returns: {type: "integer"}
  write_ao0:
    scpi: "WRITE AO ao0 {volts}"
    type: "write"
    description: "Write declared ao0; physical range is 0 to 5 V."
    parameters:
      - {name: "volts", type: "float", range: [0, 5], unit: "V"}
  write_ao1:
    scpi: "WRITE AO ao1 {volts}"
    type: "write"
    description: "Write declared ao1; physical range is 0 to 5 V."
    parameters:
      - {name: "volts", type: "float", range: [0, 5], unit: "V"}
  write_do0:
    scpi: "WRITE DO port0/line0 {value}"
    type: "write"
    description: "Write declared digital line port0/line0."
    parameters:
      - {name: "value", type: "integer", range: [0, 1]}
  safe:
    scpi: "SAFE"
    type: "write"
    description: "Drive every declared output to its explicitly configured safe value."
    parameters: []
state_query:
  ai0: {command: "read_ai0", unit: "V"}
safe_shutdown:
  - command: "safe"
